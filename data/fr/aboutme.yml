  title : Qui suis-je ?
  content : "Né en 1970, études scientifiques, informaticien, élevé aux X-Men et à Star Wars : impossible d'échapper à la littérature fantastique. <br/>Mes premiers souvenirs de lecture sont les collections \"Anticipation\" au collège. Puis ce sont \"Ravage\", \"Le grand secret\" et \"La nuit des temps\" de Barjavel, empruntés dans la bibliothèque de ma grande soeur.<br/> Une grande soeur qui m'a emmené voir \"La guerre des étoiles\" au cinéma en 1977, mon \"First step into a larger world\" comme dirait Obi-Wan.<br/> L'Anglais, j'ai la chance de le pratiquer sans problème, ce qui m'a permis de lire, quelques années après l'avoir eu avec le jeu vidéo, \"The Hobbit\" de Tolkien.<br/> Puis ce furent des décénnies de lecture : Frank Herbert, David Eddings, Isaac Asimov, en passant par Raymond E. Feist, Robert Jordan, Brandon Sanderson et Pierre Bordage. Sans oublier Stephen King et même Agatha Christie.<br/>Alimenté de la sorte, j'avais des tas d'histoires en tête mais je ne suis pas un romancier. Et puis, finalement, inspiré par des amis que je voyais mettre à exécution leurs projets, je me suis décidé à coucher ces histoires sur papier en commençant par les images que m'inspire l'écoute de l'envoutant \"Kashmir\" de Led Zeppelin.<br/> J'écris les romans que j'aimerais lire. J'espère qu'ils seront appréciés par leurs lecteurs. Faire ouvrir un de ses livres par une personne, c'est quelque part s'imposer à elle, la moindre des choses est qu'elle passe un bon moment !"
